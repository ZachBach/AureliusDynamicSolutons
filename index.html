  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

sc-if>\u003Csc-if value=\"{{ isEngineer }}\" hint-placeholder-val=\"{{ false }}\">Hard problems, \u003Cspan style=\"background:linear-gradient(120deg,#FFE7A6,#F4C95D 45%,#C9962F);-webkit-background-clip:text;background-clip:text;color:transparent\">shipped as code.\u003C/span>\u003C/sc-if>\n        \u003C/h1>\n        \u003Cp style=\"max-width:560px;margin:28px 0 0;font-size:clamp(15px,1.6vw,18px);line-height:1.65;color:#9AA7BC\">\n          \u003Csc-if value=\"{{ isImperial }}\" hint-placeholder-val=\"{{ true }}\">We engineer dynamic code for the world’s hardest challenges — climate, health, security, intelligence — with the discipline of Rome and the rigor of science. We ship proof, not promises.\u003C/sc-if>\u003Csc-if value=\"{{ isEngineer }}\" hint-placeholder-val=\"{{ false }}\">Six domains, three engines, one rule: nothing advances unproven. We take the problem end to end — hypothesis to deployment.\u003C/sc-if>\n        \u003C/p>\n        \u003Cdiv data-herocta=\"1\" style=\"margin-top:34px;display:flex;flex-wrap:wrap;gap:14px\">\n          \u003Ca href=\"#contact\" style=\"font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:14px;letter-spacing:.02em;color:#06080C;background:linear-gradient(135deg,#FFD479,#F4C95D);padding:15px 28px;border-radius:3px;text-align:center;box-shadow:0 0 0 1px rgba(244,201,93,.4),0 10px 34px rgba(244,201,93,.24);transition:transform .25s,box-shadow .25s\" style-hover=\"transform:translateY(-3px);box-shadow:0 0 0 1px rgba(244,201,93,.6),0 16px 44px rgba(244,201,93,.34)\">\n            \u003Csc-if value=\"{{ isImperial }}\" hint-placeholder-val=\"{{ true }}\">Commission an engagement\u003C/sc-if>\u003Csc-if value=\"{{ isEngineer }}\" hint-placeholder-val=\"{{ false }}\">Start an engagement\u003C/sc-if>\n          \u003C/a>\n          \u003Ca href=\"#method\" style=\"font-family:'Space Grotesk',sans-serif;font-weight:500;font-size:14px;letter-spacing:.02em;color:#E6ECF5;padding:15px 26px;border-radius:3px;border:1px solid rgba(255,255,255,.18);text-align:center;transition:border-color .25s,background .25s\" style-hover=\"border-color:rgba(244,201,93,.6);background:rgba(244,201,93,.06)\">Watch the system run\u003C/a>\n        \u003C/div>\n      \u003C/div>\n\n      \u003C!-- interactive console -->\n      \u003Cdiv style=\"flex:1;min-width:min(100%,340px)\">\n        \u003Cdiv onclick=\"{{ focusTerm }}\" style=\"position:relative;border-radius:8px;background:rgba(8,11,18,.92);border:1px solid rgba(87,212,255,.2);box-shadow:0 30px 80px rgba(0,0,0,.5),0 0 40px rgba(43,108,246,.1);overflow:hidden;cursor:text\">\n          \u003Cdiv style=\"display:flex;align-items:center;justify-content:space-between;gap:14px;padding:12px 16px;border-bottom:1px solid rgba(255,255,255,.07);background:rgba(255,255,255,.02)\">\n            \u003Cspan style=\"display:flex;gap:6px\">\u003Cspan style=\"width:9px;height:9px;border-radius:50%;background:#F4C95D\">\u003C/span>\u003Cspan style=\"width:9px;height:9px;border-radius:50%;background:#57D4FF\">\u003C/span>\u003Cspan style=\"width:9px;height:9px;border-radius:50%;background:#2B6CF6\">\u003C/span>\u003C/span>\n            \u003Cspan style=\"font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.12em;color:#8A97AB\">aurelius.console — /partners\u003C/span>\n            \u003Cspan style=\"font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:.14em;color:#57D4FF\">SECURE\u003C/span>\n          \u003C/div>\n          \u003Cdiv ref=\"{{ termBodyRef }}\" style=\"height:284px;overflow-y:auto;padding:16px 18px;display:flex;flex-direction:column;gap:6px\">\n            \u003Csc-for list=\"{{ termLines }}\" as=\"tl\" hint-placeholder-count=\"3\">\n              \u003Cdiv style=\"font-family:'JetBrains Mono',monospace;font-size:12.5px;line-height:1.65;color:{{ tl.color }};white-space:pre-wrap;word-break:break-word\">{{ tl.text }}\u003C/div>\n            \u003C/sc-for>\n          \u003C/div>\n          \u003Cdiv style=\"display:flex;align-items:center;gap:10px;padding:12px 18px;border-top:1px solid rgba(255,255,255,.07)\">\n            \u003Cspan style=\"font-family:'JetBrains Mono',monospace;font-size:13px;color:#F4C95D\">$\u003C/span>\n            \u003Cinput ref=\"{{ termInputRef }}\" onkeydown=\"{{ onTermKey }}\" placeholder=\"type a command…\" spellcheck=\"false\" autocomplete=\"off\" style=\"flex:1;background:transparent;border:none;font-family:'JetBrains Mono',monospace;font-size:13px;color:#E6ECF5;caret-color:#F4C95D;padding:0\">\n            \u003Cspan style=\"width:8px;height:16px;background:#F4C95D;box-shadow:0 0 8px #F4C95D;animation:acs-blink 1s step-end infinite\">\u003C/span>\n          \u003C/div>\n        \u003C/div>\n        \u003Cdiv style=\"margin-top:12px;text-align:center;font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.1em;color:#5C6678\">the console is live — try \u003Cspan style=\"color:#F4C95D\">`help`\u003C/span> or \u003Cspan style=\"color:#F4C95D\">`solve &lt;your problem&gt;`\u003C/span>\u003C/div>\n      \u003C/div>\n    \u003C/div>\n    \u003Cdiv data-scrollcue=\"1\" style=\"position:absolute;bottom:30px;left:50%;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center;gap:10px\">\n      \u003Cspan style=\"font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:.34em;color:rgba(154,167,188,.65)\">SCROLL\u003C/span>\n      \u003Cspan style=\"position:relative;width:1px;height:40px;background:rgba(255,255,255,.12);overflow:hidden\">\u003Cspan style=\"position:absolute;top:0;left:0;width:1px;height:14px;background:#F4C95D;animation:acs-scrolldot 1.8s ease-in-out infinite\">\u003C/span>\u003C/span>\n    \u003C/div>\n  \u003C/section>\n\n  \u003C!-- ============ PROBLEM ============ -->\n  \u003Csection id=\"problem\" data-spy=\"problem\" data-screen-label=\"Problem\" style=\"position:relative;padding:clamp(80px,11vh,130px) 6vw;scroll-margin-top:80px;border-top:1px solid rgba(255,255,255,.07)\">\n    \u003Cdiv style=\"max-width:1180px;margin:0 auto\">\n      \u003Cdiv data-reveal=\"1\" style=\"opacity:0;transform:translateY(26px);transition:opacity .8s cubic-bezier(.16,1,.3,1),transform .8s cubic-bezier(.16,1,.3,1)\">\n        \u003Cdiv style=\"display:flex;align-items:center;gap:12px;margin-bottom:22px\">\n          \u003Cspan style=\"width:7px;height:7px;border-radius:50%;background:#F4C95D;box-shadow:0 0 12px #F4C95D\">\u003C/span>\n          \u003Cspan style=\"font-family:'JetBrains Mono',monospace;font-size:12px;letter-spacing:.34em;color:#9AA7BC;text-transform:uppercase\">01 · The Problem\u003C/span>\n          \u003Cspan style=\"flex:1;height:1px;background:linear-gradient(90deg,rgba(244,201,93,.35),transparent)\">\u003C/span>\n        \u003C/div>\n        \u003Ch2 style=\"font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:clamp(30px,4.4vw,56px);line-height:1.04;letter-spacing:-.025em;margin:0;color:#E6ECF5;max-width:22ch;text-wrap:balance\">Ambition isn’t the constraint. Execution is.\u003C/h2>\n        \u003Cp style=\"font-size:16px;line-height:1.7;color:#9AA7BC;margin:24px 0 0;max-width:62ch\">Every global challenge is now bottlenecked by software that can’t keep pace. The distance between what’s needed and what ships — that’s the problem we sell against.\u003C/p>\n      \u003C/div>\n      \u003Cdiv data-reveal=\"1\" data-reveal-delay=\"120\" style=\"opacity:0;transform:translateY(26px);transition:opacity .8s cubic-bezier(.16,1,.3,1) .12s,transform .8s cubic-bezier(.16,1,.3,1) .12s;display:grid;grid-template-columns:repeat(auto-fit,minmax(min(100%,250px),1fr));gap:18px;margin-top:52px\">\n        \u003Csc-for list=\"{{ problems }}\" as=\"p\" hint-placeholder-count=\"4\">\n          \u003Cdiv style=\"padding:30px 26px;background:linear-gradient(180deg,rgba(255,255,255,.04),rgba(255,255,255,.012));border:1px solid rgba(255,255,255,.08);border-radius:5px;transition:border-color .35s,transform .35s\" style-hover=\"border-color:rgba(244,201,93,.4);transform:translateY(-4px)\">\n            \u003Cdiv style=\"display:flex;align-items:center;justify-content:space-between;gap:12px\">\n              \u003Cspan style=\"font-family:'JetBrains Mono',monospace;font-size:11px;color:#57D4FF;letter-spacing:.06em\">{{ p.tag }}\u003C/span>\n              \u003Cspan style=\"font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:.18em;color:#F4C95D;padding:4px 8px;border:1px solid rgba(244,201,93,.35);border-radius:3px\">{{ p.status }}\u003C/span>\n            \u003C/div>\n            \u003Ch3 style=\"font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:21px;margin:20px 0 10px;color:#E6ECF5;letter-spacing:-.01em\">{{ p.title }}\u003C/h3>\n            \u003Cp style=\"font-size:14.5px;line-height:1.6;color:#9AA7BC;margin:0\">{{ p.line }}\u003C/p>\n          \u003C/div>\n        \u003C/sc-for>\n      \u003C/div>\n    \u003C/div>\n  \u003C/section>\n\n  \u003C!-- ============ SOLUTIONS ============ -->\n  \u003Csection id=\"solutions\" data-spy=\"solutions\" data-screen-label=\"Solutions\" style=\"position:relative;padding:clamp(80px,11vh,130px) 6vw;scroll-margin-top:80px;border-top:1px solid rgba(255,255,255,.07);background:#080B12\">\n    \u003Cdiv style=\"max-width:1180px;margin:0 auto\">\n      \u003Cdiv data-reveal=\"1\" style=\"opacity:0;transform:translateY(26px);transition:opacity .8s cubic-bezier(.16,1,.3,1),transform .8s cubic-bezier(.16,1,.3,1);display:flex;flex-wrap:wrap;justify-content:space-between;align-items:flex-end;gap:24px\">\n        \u003Cdiv>\n          \u003Cdiv style=\"display:flex;align-items:center;gap:12px;margin-bottom:22px\">\n            \u003Cspan style=\"width:7px;height:7px;border-radius:50%;background:#57D4FF;box-shadow:0 0 12px #57D4FF\">\u003C/span>\n            \u003Cspan style=\"font-family:'JetBrains Mono',monospace;font-size:12px;letter-spacing:.34em;color:#9AA7BC;text-transform:uppercase\">02 · Solutions\u003C/span>\n          \u003C/div>\n          \u003Ch2 style=\"font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:clamp(30px,4.4vw,56px);line-height:1.04;letter-spacing:-.025em;margin:0;color:#E6ECF5;max-width:18ch;text-wrap:balance\">Six domains. One discipline.\u003C/h2>\n        \u003C/div>\n        \u003Cp style=\"font-size:15px;line-height:1.6;color:#9AA7BC;max-width:340px;margin:0\">Not advice — engineered outcomes. Every engagement is scoped to ship.\u003C/p>\n      \u003C/div>\n      \u003Cdiv data-reveal=\"1\" data-reveal-delay=\"120\" style=\"opacity:0;transform:translateY(26px);transition:opacity .8s cubic-bezier(.16,1,.3,1) .12s,transform .8s cubic-bezier(.16,1,.3,1) .12s;display:grid;grid-template-columns:repeat(auto-fit,minmax(min(100%,300px),1fr));gap:1px;margin-top:52px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.07);border-radius:6px;overflow:hidden\">\n        \u003Csc-for list=\"{{ solutions }}\" as=\"item\" hint-placeholder-count=\"6\">\n          \u003Cdiv style=\"position:relative;padding:32px 30px;background:#080B12;transition:background .35s\" style-hover=\"background:#0D1320\">\n            \u003Cdiv style=\"display:flex;align-items:center;justify-content:space-between;gap:16px\">\n              \u003Cspan style=\"font-family:'JetBrains Mono',monospace;font-size:12px;color:#C9962F;letter-spacing:.1em\">{{ item.idx }}\u003C/span>\n              \u003Cspan style=\"font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.06em;color:#5C6678\">{{ item.tag }}\u003C/span>\n            \u003C/div>\n            \u003Ch3 style=\"font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:19px;margin:20px 0 11px;color:#E6ECF5;line-height:1.2\">{{ item.name }}\u003C/h3>\n            \u003Cp style=\"font-size:14px;line-height:1.6;color:#9AA7BC;margin:0\">{{ item.line }}\u003C/p>\n          \u003C/div>\n        \u003C/sc-for>\n      \u003C/div>\n    \u003C/div>\n  \u003C/section>\n\n  \u003C!-- ============ METHOD + LIVE DEMO ============ -->\n  \u003Csection id=\"method\" data-spy=\"method\" data-screen-label=\"Method\" style=\"position:relative;padding:clamp(80px,11vh,130px) 6vw;scroll-margin-top:80px;border-top:1px solid rgba(255,255,255,.07);overflow:hidden\">\n    \u003Cdiv data-glow=\"1\" style=\"position:absolute;top:20%;right:-8%;width:600px;height:600px;background:radial-gradient(circle,rgba(43,108,246,.12),transparent 66%);pointer-events:none\">\u003C/div>\n    \u003Cdiv style=\"position:relative;max-width:1180px;margin:0 auto\">\n      \u003Cdiv data-reveal=\"1\" style=\"opacity:0;transform:translateY(26px);transition:opacity .8s cubic-bezier(.16,1,.3,1),transform .8s cubic-bezier(.16,1,.3,1)\">\n        \u003Cdiv style=\"display:flex;align-items:center;gap:12px;margin-bottom:22px\">\n          \u003Cspan style=\"width:7px;height:7px;border-radius:50%;background:#F4C95D;box-shadow:0 0 12px #F4C95D\">\u003C/span>\n          \u003Cspan style=\"font-family:'JetBrains Mono',monospace;font-size:12px;letter-spacing:.34em;color:#9AA7BC;text-transform:uppercase\">03 · The Method\u003C/span>\n          \u003Cspan style=\"flex:1;height:1px;background:linear-gradient(90deg,rgba(244,201,93,.35),transparent)\">\u003C/span>\n        \u003C/div>\n        \u003Ch2 style=\"font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:clamp(30px,4.4vw,56px);line-height:1.04;letter-spacing:-.025em;margin:0;color:#E6ECF5;max-width:22ch;text-wrap:balance\">Three engines. Nothing ships unproven.\u003C/h2>\n        \u003Cp style=\"font-size:16px;line-height:1.7;color:#9AA7BC;margin:24px 0 0;max-width:62ch\">Every engagement runs the same gauntlet: research investigates, cross-validation attacks, execution ships. Watch it run.\u003C/p>\n      \u003C/div>\n\n      \u003C!-- live demo widget -->\n      \u003Cdiv data-reveal=\"1\" data-reveal-delay=\"120\" style=\"opacity:0;transform:translateY(26px);transition:opacity .8s cubic-bezier(.16,1,.3,1) .12s,transform .8s cubic-bezier(.16,1,.3,1) .12s;margin-top:52px;border:1px solid rgba(87,212,255,.2);border-radius:8px;background:rgba(8,11,18,.9);box-shadow:0 24px 70px rgba(0,0,0,.45);overflow:hidden\">\n        \u003Cdiv style=\"display:flex;flex-wrap:wrap;align-items:center;justify-content:space-between;gap:14px;padding:16px 22px;border-bottom:1px solid rgba(255,255,255,.07);background:rgba(255,255,255,.02)\">\n          \u003Cspan style=\"display:flex;align-items:center;gap:10px;font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.2em;color:#9AA7BC\">\u003Cspan style=\"width:7px;height:7px;border-radius:50%;background:#57D4FF;box-shadow:0 0 10px #57D4FF;animation:acs-pulse 2.4s ease-in-out infinite\">\u003C/span>LIVE // RUN A PROBLEM THROUGH THE SYSTEM\u003C/span>\n          \u003Cdiv style=\"display:flex;flex-wrap:wrap;gap:8px\">\n            \u003Csc-for list=\"{{ scenarios }}\" as=\"sc\" hint-placeholder-count=\"3\">\n              \u003Cbutton onclick=\"{{ sc.onPick }}\" style=\"cursor:pointer;font-family:'JetBrains Mono',monospace;font-size:10.5px;letter-spacing:.06em;color:{{ sc.color }};background:{{ sc.bg }};border:1px solid {{ sc.border }};border-radius:20px;padding:7px 14px;transition:all .25s\" style-hover=\"border-color:#F4C95D;color:#F4C95D\">{{ sc.label }}\u003C/button>\n            \u003C/sc-for>\n          \u003C/div>\n        \u003C/div>\n        \u003Cdiv style=\"display:flex;flex-wrap:wrap;gap:0\">\n          \u003Cdiv style=\"flex:1.1;min-width:min(100%,340px);padding:34px 30px;display:flex;flex-direction:column;justify-content:center\">\n            \u003Cdiv style=\"display:flex;align-items:center\">\n              \u003Csc-for list=\"{{ engineNodes }}\" as=\"n\" hint-placeholder-count=\"3\">\n                \u003Cdiv style=\"flex:1;display:flex;flex-direction:column;align-items:center;gap:12px;min-width:0\">\n                  \u003Cdiv style=\"width:100%;max-width:110px;height:4px;border-radius:4px;background:{{ n.bar }};box-shadow:{{ n.glow }};transition:all .5s\">\u003C/div>\n                  \u003Cdiv style=\"font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.2em;color:{{ n.col }};transition:color .5s;text-align:center\">{{ n.name }}\u003C/div>\n                \u003C/div>\n              \u003C/sc-for>\n            \u003C/div>\n            \u003Cdiv style=\"margin-top:26px;display:flex;align-items:center;justify-content:center;gap:16px\">\n              \u003Cbutton onclick=\"{{ onRun }}\" style=\"cursor:pointer;font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:13px;letter-spacing:.04em;color:#06080C;background:linear-gradient(135deg,#FFD479,#F4C95D);border:none;border-radius:3px;padding:12px 26px;box-shadow:0 0 0 1px rgba(244,201,93,.4),0 8px 26px rgba(244,201,93,.2);transition:transform .2s\" style-hover=\"transform:translateY(-2px)\">{{ runLabel }}\u003C/button>\n              \u003Csc-if value=\"{{ demoDone }}\" hint-placeholder-val=\"{{ false }}\">\n                \u003Cspan style=\"font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.16em;color:#F4C95D;border:1px solid rgba(244,201,93,.45);border-radius:3px;padding:9px 14px;background:rgba(244,201,93,.07)\">PROVEN · READY TO SHIP\u003C/span>\n              \u003C/sc-if>\n            \u003C/div>\n          \u003C/div>\n          \u003Cdiv style=\"flex:1;min-width:min(100%,340px);border-left:1px solid rgba(255,255,255,.07)\">\n            \u003Cdiv ref=\"{{ demoLogRef }}\" style=\"height:238px;overflow-y:auto;padding:20px 24px;display:flex;flex-direction:column;gap:7px\">\n              \u003Csc-for list=\"{{ demoLog }}\" as=\"dl\" hint-placeholder-count=\"2\">\n                \u003Cdiv style=\"font-family:'JetBrains Mono',monospace;font-size:12px;line-height:1.6;color:{{ dl.color }};white-space:pre-wrap\">{{ dl.text }}\u003C/div>\n              \u003C/sc-for>\n            \u003C/div>\n          \u003C/div>\n        \u003C/div>\n      \u003C/div>\n\n      \u003C!-- engine cards -->\n      \u003Cdiv data-reveal=\"1\" data-reveal-delay=\"160\" style=\"opacity:0;tra Cdiv style=\"margin-top:14px\">\u003Cspan style=\"font-family:'JetBrains Mono',monospace;font-weight:600;font-size:8px;letter-spacing:.16em;color:#C9D4E3;background:#161B24;border:1px solid rgba(255,255,255,.12);padding:2px 7px;border-radius:2px\">REDACTED\u003C/span>\u003C/div>\n          \u003Cdiv style=\"margin-top:6px;font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.14em;color:#F4C95D\">PRINCIPAL · SECURITY\u003C/div>\n          \u003Cp style=\"font-size:13.5px;line-height:1.6;color:#9AA7BC;margin:12px 0 0\">Cryptography and zero-trust from the first commit.\u003C/p>\n        \u003C/div>\n      \u003C/div>\n      \u003Cp style=\"margin:20px 0 0;font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.08em;color:#5C6678\">// full profiles shared on request\u003C/p>\n    \u003C/div>\n  \u003C/section>\n\n  \u003C!-- ============ CONTACT ============ -->\n  \u003Csection id=\"contact\" data-spy=\"contact\" data-screen-label=\"Contact\" style=\"position:relative;padding:clamp(80px,11vh,130px) 6vw 60px;scroll-margin-top:80px;border-top:1px solid rgba(255,255,255,.07);background:linear-gradient(180deg,#080B12,#06080C);overflow:hidden\">\n    \u003Cdiv data-glow=\"1\" style=\"position:absolute;top:12%;left:50%;width:760px;height:560px;transform:translateX(-50%);background:radial-gradient(ellipse at center,rgba(244,201,93,.12),transparent 68%);animation:acs-glow 8s ease-in-out infinite;pointer-events:none\">\u003C/div>\n    \u003Cdiv style=\"position:relative;max-width:860px;margin:0 auto\">\n      \u003Cdiv data-reveal=\"1\" style=\"opacity:0;transform:translateY(26px);transition:opacity .8s cubic-bezier(.16,1,.3,1),transform .8s cubic-bezier(.16,1,.3,1);text-align:center;display:flex;flex-direction:column;align-items:center\">\n        \u003Cdiv style=\"display:flex;align-items:center;gap:12px;margin-bottom:22px\">\n          \u003Cspan style=\"width:7px;height:7px;border-radius:50%;background:#F4C95D;box-shadow:0 0 12px #F4C95D\">\u003C/span>\n          \u003Cspan style=\"font-family:'JetBrains Mono',monospace;font-size:12px;letter-spacing:.34em;color:#9AA7BC;text-transform:uppercase\">08 · Begin\u003C/span>\n        \u003C/div>\n        \u003Ch2 style=\"font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:clamp(32px,5vw,64px);line-height:1.02;letter-spacing:-.03em;margin:0;color:#E6ECF5;text-wrap:balance\">Bring us the \u003Cspan style=\"background:linear-gradient(120deg,#FFE7A6,#F4C95D 50%,#C9962F);-webkit-background-clip:text;background-clip:text;color:transparent\">impossible one.\u003C/span>\u003C/h2>\n        \u003Cp style=\"font-size:16px;line-height:1.7;color:#9AA7BC;margin:22px 0 0;max-width:52ch\">Describe the problem. A principal replies within 48 hours — confidential by default.\u003C/p>\n      \u003C/div>\n\n      \u003Cdiv data-reveal=\"1\" data-reveal-delay=\"120\" style=\"opacity:0;transform:translateY(26px);transition:opacity .8s cubic-bezier(.16,1,.3,1) .12s,transform .8s cubic-bezier(.16,1,.3,1) .12s;margin-top:46px;border:1px solid rgba(255,255,255,.1);border-radius:8px;background:rgba(8,11,18,.9);box-shadow:0 24px 70px rgba(0,0,0,.4);overflow:hidden\">\n        \u003Cdiv style=\"display:flex;align-items:center;justify-content:space-between;gap:14px;padding:13px 20px;border-bottom:1px solid rgba(255,255,255,.07);background:rgba(255,255,255,.02)\">\n          \u003Cspan style=\"font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.14em;color:#8A97AB\">aurelius.brief — new engagement\u003C/span>\n          \u003Cspan style=\"font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:.14em;color:#57D4FF\">ENCRYPTED\u003C/span>\n        \u003C/div>\n        \u003Csc-if value=\"{{ showForm }}\" hint-placeholder-val=\"{{ true }}\">\n          \u003Cform onsubmit=\"{{ onSubmit }}\" style=\"padding:26px 24px;display:grid;grid-template-columns:repeat(auto-fit,minmax(min(100%,240px),1fr));gap:14px\">\n            \u003Cinput ref=\"{{ nameRef }}\" placeholder=\"Your name\" style=\"background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.12);border-radius:4px;padding:14px 16px;font-family:'JetBrains Mono',monospace;font-size:13px;color:#E6ECF5;transition:border-color .25s\" style-focus=\"border-color:rgba(244,201,93,.6)\">\n            \u003Cinput ref=\"{{ orgRef }}\" placeholder=\"Organization\" style=\"background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.12);border-radius:4px;padding:14px 16px;font-family:'JetBrains Mono',monospace;font-size:13px;color:#E6ECF5;transition:border-color .25s\" style-focus=\"border-color:rgba(244,201,93,.6)\">\n            \u003Cselect ref=\"{{ domainRef }}\" style=\"grid-column:1/-1;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.12);border-radius:4px;padding:14px 16px;font-family:'JetBrains Mono',monospace;font-size:13px;color:#E6ECF5;transition:border-color .25s\" style-focus=\"border-color:rgba(244,201,93,.6)\">\n              \u003Coption value=\"\" style=\"background:#0B0F16\">Problem domain…\u003C/option>\n              \u003Coption value=\"ai\" style=\"background:#0B0F16\">Applied AI &amp; Autonomy\u003C/option>\n              \u003Coption value=\"climate\" style=\"background:#0B0F16\">Climate &amp; Energy\u003C/option>\n              \u003Coption value=\"health\" style=\"background:#0B0F16\">Health &amp; Genomics\u003C/option>\n              \u003Coption value=\"security\" style=\"background:#0B0F16\">Security &amp; Cryptography\u003C/option>\n              \u003Coption value=\"data\" style=\"background:#0B0F16\">Data Science &amp; Simulation\u003C/option>\n              \u003Coption value=\"civic\" style=\"background:#0B0F16\">Civic &amp; Global Platforms\u003C/option>\n              \u003Coption value=\"other\" style=\"background:#0B0F16\">Something else\u003C/option>\n            \u003C/select>\n            \u003Ctextarea ref=\"{{ briefRef }}\" placeholder=\"Describe the problem. What's impossible about it?\" rows=\"5\" style=\"grid-column:1/-1;resize:vertical;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.12);border-radius:4px;padding:14px 16px;font-family:'JetBrains Mono',monospace;font-size:13px;line-height:1.6;color:#E6ECF5;transition:border-color .25s\" style-focus=\"border-color:rgba(244,201,93,.6)\">\u003C/textarea>\n            \u003Cdiv style=\"grid-column:1/-1;display:flex;flex-wrap:wrap;align-items:center;justify-content:space-between;gap:14px\">\n              \u003Cspan style=\"font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.06em;color:{{ formErrorColor }}\">{{ formNote }}\u003C/span>\n              \u003Cbutton type=\"submit\" style=\"cursor:pointer;font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:14px;letter-spacing:.02em;color:#06080C;background:linear-gradient(135deg,#FFD479,#F4C95D);border:none;border-radius:3px;padding:14px 30px;box-shadow:0 0 0 1px rgba(244,201,93,.4),0 10px 30px rgba(244,201,93,.22);transition:transform .2s\" style-hover=\"transform:translateY(-2px)\">\n                \u003Csc-if value=\"{{ isImperial }}\" hint-placeholder-val=\"{{ true }}\">Transmit the brief\u003C/sc-if>\u003Csc-if value=\"{{ isEngineer }}\" hint-placeholder-val=\"{{ false }}\">Send brief\u003C/sc-if>\n              \u003C/button>\n            \u003C/div>\n          \u003C/form>\n        \u003C/sc-if>\n        \u003Csc-if value=\"{{ showReceipt }}\" hint-placeholder-val=\"{{ false }}\">\n          \u003Cdiv style=\"padding:42px 30px;display:flex;flex-direction:column;align-items:center;text-align:center;gap:12px\">\n            \u003Cspan style=\"font-family:'JetBrains Mono',monospace;font-size:12px;letter-spacing:.3em;color:#F4C95D;border:1px solid rgba(244,201,93,.45);border-radius:3px;padding:10px 18px;background:rgba(244,201,93,.07)\">TRANSMISSION RECEIVED\u003C/span>\n            \u003Cdiv style=\"font-family:'JetBrains Mono',monospace;font-size:13px;color:#9AA7BC;margin-top:10px\">ref: \u003Cspan style=\"color:#E \"100%\" height=\"100%\" style=\"display:block\">\u003Cpolygon points=\"60,12 101.6,36 101.6,84 60,108 18.4,84 18.4,36\" fill=\"none\" stroke=\"#4DA3FF\" stroke-width=\"3\" stroke-linejoin=\"round\">\u003C/polygon>\u003Cpath d=\"M60 30 L41 87 M60 30 L79 87 M49 67 L71 67\" fill=\"none\" stroke=\"#F4C95D\" stroke-width=\"6\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\u003C/path>\u003Ccircle cx=\"60\" cy=\"30\" r=\"7\" fill=\"#FFD479\">\u003C/circle>\u003C/svg>\u003C/span>\u003Cspan style=\"font-family:'Cinzel',serif;font-weight:700;font-size:13px;letter-spacing:.16em;color:#8A97AB\">AURELIUS\u003C/span>\u003C/span>\n      \u003Cspan style=\"font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.1em;color:#F4C95D\">// one line of code at a time\u003C/span>\n      \u003Cspan style=\"font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.14em;color:#5C6678;text-transform:uppercase\">© MMXXVI · Solve · Validate · Ship · Repeat\u003C/span>\n    \u003C/div>\n  \u003C/section>\n\n\u003C/div>\n\u003C/x-dc>\n\u003Cscript type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;copyVoice&quot;: {&quot;editor&quot;: &quot;enum&quot;, &quot;options&quot;: [&quot;imperial&quot;, &quot;engineer&quot;], &quot;default&quot;: &quot;imperial&quot;, &quot;tsType&quot;: &quot;string&quot;, &quot;section&quot;: &quot;Voice&quot;}, &quot;motion&quot;: {&quot;editor&quot;: &quot;enum&quot;, &quot;options&quot;: [&quot;maximal&quot;, &quot;balanced&quot;, &quot;calm&quot;], &quot;default&quot;: &quot;maximal&quot;, &quot;tsType&quot;: &quot;string&quot;, &quot;section&quot;: &quot;Motion&quot;}, &quot;showHud&quot;: {&quot;editor&quot;: &quot;boolean&quot;, &quot;default&quot;: true, &quot;tsType&quot;: &quot;boolean&quot;, &quot;section&quot;: &quot;Motion&quot;}}\">\nclass Component extends DCLogic {\n  state = {\n    active: 'hero',\n    menuOpen: false,\n    termLines: [],\n    demoRun: -1,\n    demoStage: -1,\n    demoLog: [{ text: 'idle — pick a scenario or hit RUN', color: '#5C6678' }],\n    formState: 'idle',\n    formNote: '',\n    refCode: ''\n  };\n\n  engineDefs = [\n    { name: 'RESEARCH', accent: '#F4C95D' },\n    { name: 'CROSS-VALIDATE', accent: '#57D4FF' },\n    { name: 'EXECUTE', accent: '#FFD479' }\n  ];\n\n  scenarioDefs = [\n    { label: 'grid load forecasting', steps: [\n      { stage: 0, color: '#F4C95D', text: '[research] ingesting 14 regional grid feeds' },\n      { stage: 0, color: '#F4C95D', text: '[research] constraint map: weather · demand · storage decay' },\n      { stage: 1, color: '#57D4FF', text: '[validate] adversarial replay ×200 · 3/3 claims verified' },\n      { stage: 1, color: '#57D4FF', text: '[validate] error bounds sealed: ±1.8% @ 72h horizon' },\n      { stage: 2, color: '#FFD479', text: '[execute] architecture compiled · rollout staged' },\n      { stage: 2, color: '#FFD479', text: '[execute] ✓ proven — ready to ship' }\n    ]},\n    { label: 'genomic pipeline', steps: [\n      { stage: 0, color: '#F4C95D', text: '[research] profiling pipeline: 41 failure modes mapped' },\n      { stage: 0, color: '#F4C95D', text: '[research] hypothesis: I/O contention, not compute' },\n      { stage: 1, color: '#57D4FF', text: '[validate] fault injection ×500 · zero silent corruption' },\n      { stage: 1, color: '#57D4FF', text: '[validate] throughput claim verified: 6.4× sustained' },\n      { stage: 2, color: '#FFD479', text: '[execute] hardened DAG shipped behind feature gate' },\n      { stage: 2, color: '#FFD479', text: '[execute] ✓ proven — ready to ship' }\n    ]},\n    { label: 'zero-trust rotation', steps: [\n      { stage: 0, color: '#F4C95D', text: '[research] threat model drafted · 9 attack paths enumerated' },\n      { stage: 0, color: '#F4C95D', text: '[research] rotation target: zero downtime' },\n      { stage: 1, color: '#57D4FF', text: '[validate] formal proof checked · protocol sound' },\n      { stage: 1, color: '#57D4FF', text: '[validate] red-team pass: 0 privilege escalations' },\n      { stage: 2, color: '#FFD479', text: '[execute] rollout compiled · canary green' },\n      { stage: 2, color: '#FFD479', text: '[execute] ✓ proven — ready to ship' }\n    ]}\n  ];\n\n  componentDidMount() {\n    this._tt = []; this._dt = [];\n    this._lastTerm = 0; this._lastDemo = 0;\n    this.term('aurelius.console v3.1 — secure channel established', '#9AA7BC', 500);\n    this.term('8 sections indexed · engines nominal', '#9AA7BC', 1100);\n    this.term('type `help` for commands, or `solve \u003Cyour problem>`', '#F4C95D', 1800);\n    this.setupReveal();\n    this.setupCounters();\n    this.setupSpy();\n    this.setupParallax();\n    this.applyTweaks();\n  }\n  componentDidUpdate() {\n    this.applyTweaks();\n    if (this.termBodyEl && this.state.termLines.length !== this._lastTerm) {\n      this._lastTerm = this.state.termLines.length;\n      this.termBodyEl.scrollTop = this.termBodyEl.scrollHeight;\n    }\n    if (this.demoLogEl && this.state.demoLog.length !== this._lastDemo) {\n      this._lastDemo = this.state.demoLog.length;\n      this.demoLogEl.scrollTop = this.demoLogEl.scrollHeight;\n    }\n  }\n  componentWillUnmount() {\n    (this._tt || []).forEach(clearTimeout);\n    (this._dt || []).forEach(clearTimeout);\n    clearTimeout(this._revealFallback);\n    if (this._io) this._io.disconnect();\n    if (this._cio) this._cio.disconnect();\n    if (this._sio) this._sio.disconnect();\n    if (this._onParallax) window.removeEventListener('scroll', this._onParallax);\n  }\n\n  /* ---------- hero parallax ---------- */\n  setupParallax() {\n    const root = this.rootEl || document;\n    const els = [...root.querySelectorAll('[data-parallax]')];\n    if (!els.length) return;\n    const reduce = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;\n    if (reduce) return;\n    els.forEach(el => {\n      el.__pxBase = el.style.transform || '';\n      el.__pxSpeed = parseFloat(el.getAttribute('data-parallax')) || 0.2;\n    });\n    let ticking = false;\n    const update = () => {\n      const y = window.scrollY || window.pageYOffset || 0;\n      for (const el of els) {\n        const shift = Math.round(y * el.__pxSpeed);\n        el.style.transform = (el.__pxBase ? el.__pxBase + ' ' : '') + 'translate3d(0,' + shift + 'px,0)';\n      }\n      ticking = false;\n    };\n    this._onParallax = () => {\n      if (!ticking) { ticking = true; requestAnimationFrame(update); }\n    };\n    window.addEventListener('scroll', this._onParallax, { passive: true });\n    update();\n  }\n\n  /* ---------- terminal ---------- */\n  term(text, color, delay) {\n    const push = () => this.setState(s => ({ termLines: [...s.termLines, { text, color }] }));\n    if (delay) this._tt.push(setTimeout(push, delay)); else push();\n  }\n  goSection(id) {\n    const el = (this.rootEl || document).querySelector('#' + id);\n    if (!el) return;\n    const top = el.getBoundingClientRect().top + window.scrollY - 76;\n    window.scrollTo({ top, behavior: 'smooth' });\n  }\n  exec(raw) {\n    const cmd = raw.trim();\n    if (!cmd) return;\n    this.term('$ ' + cmd, '#E6ECF5');\n    const parts = cmd.toLowerCase().split(/\\s+/);\n    const head = parts[0];\n    const arg = parts.slice(1).join(' ');\n    const nav = ['problem', 'solutions', 'method', 'stack', 'impact', 'roadmap', 'team', 'contact'];\n    if (head === 'help') {\n      this.term('commands: ' + nav.join(' · '), '#9AA7BC');\n      this.term('          solve \u003Cproblem> · status · whoami · clear', '#9AA7BC');\n    } else if (nav.indexOf(head) >= 0) {\n      this.term('→ navigating to /' + head, '#57D4FF');\n      this.goSection(head);\n    } else if (head === 'solve') {\n      const p = arg || 'the impossible one';\n      this.term('[research] investigating \"' + p + '\" · hypothesis drafted', '#F4C95D', 450);\n      this.term('[validate] adversarial review · claims verified', '#57D4FF', 1250);\n      this.term('[execute] plan compiled · proven — ready to ship', '#FFD479', 2050);\n      this.term('// one line of code at a time', '#9AA7BC', 2650);\n    } else if (head === 'status') {\n      this.term('engines: research ✓ · validate ✓ · execute ✓ — nominal', '#9AA7BC');\n      this.term('site: https://aureliusdynamic.com — LIVE', '#57D4FF');\n    } else if (head === 'whoami') {\n      this.term('prospective partner · clearance: granted', '#9AA7BC');\n    } else if (head === 'clear') {\n      this.setState({ termLines: [] });\n    } else if (head === 'aurelius' || head === 'motto') {\n      this.term('\"Impossible is a systems problem.\"', '#F4C95D');\n    } else {\n      this.term('unknown command `' + head + '` — try `help`', '#C9962F');\n    }\n  }\n\n  /* ---------- demo widget ---------- */\n  runDemo(i) {\n    this._dt.forEach(clearTimeout); this._dt = [];\n    const sc = this.scenarioDefs[i];\n    this.setState({ demoRun: i, demoStage: -1, demoLog: [{ text: 'run: ' + sc.label, color: '#E6ECF5' }] });\n    sc.steps.forEach((st, k) => {\n      this._dt.push(setTimeout(() => {\n        this.setState(s => ({\n          demoStage: Math.max(s.demoStage, st.stage),\n          demoLog: [...s.demoLog, { text: st.text, color: st.color }]\n        }));\n      }, 600 + k * 700));\n    });\n    this._dt.push(setTimeout(() => this.setState({ demoStage: 3 }), 600 + sc.steps.length * 700));\n  }\n\n  /* ---------- observers ---------- */\n  setupReveal() {\n    const root = this.rootEl || document;\n    const els = root.querySelectorAll('[data-reveal]');\n    const reveal = (el) => {\n      el.style.transitionDelay = (el.getAttribute('data-reveal-delay') || 0) + 'ms';\n      el.style.opacity = '1';\n      el.style.transform = 'none';\n    };\n    if (!('IntersectionObserver' in window)) { els.forEach(reveal); return; }\n    this._io = new IntersectionObserver((entries) => {\n      entries.forEach(e => { if (e.isIntersecting) { reveal(e.target); this._io.unobserve(e.target); } });\n    }, { threshold: 0.12, rootMargin: '0px 0px -8% 0px' });\n    els.forEach(el => this._io.observe(el));\n    this._revealFallback = setTimeout(() => { els.forEach(reveal); }, 1600);\n  }\n  setupCounters() {\n    const root = this.rootEl || document;\n    const els = root.querySelectorAll('[data-counter]');\n    if (!('IntersectionObserver' in window)) { els.forEach(el => this.animateCount(el)); return; }\n    this._cio = new IntersectionObserver((entries) => {\n      entries.forEach(e => { if (e.isIntersecting) { this.animateCount(e.target); this._cio.unobserve(e.target); } });\n    }, { threshold: 0.5 });\n    els.forEach(el => this._cio.observe(el));\n  }\n  animateCount(el) {\n    const target = parseFloat(el.getAttribute('data-counter')) || 0;\n    const dur = 1600, start = performance.now();\n    const step = (now) => {\n      const p = Math.min(1, (now - start) / dur);\n      el.textContent = Math.round(target * (1 - Math.pow(1 - p, 3)));\n      if (p \u003C 1) requestAnimationFrame(step); else el.textContent = target;\n    };\n    requestAnimationFrame(step);\n  }\n  setupSpy() {\n    const root = this.rootEl || document;\n    const els = root.querySelectorAll('[data-spy]');\n    if (!('IntersectionObserver' in window)) return;\n    this._sio = new IntersectionObserver((entries) => {\n      entries.forEach(e => {\n        if (e.isIntersecting) this.setState({ active: e.target.getAttribute('data-spy') });\n      });\n    }, { rootMargin: '-38% 0px -55% 0px', threshold: 0 });\n    els.forEach(el => this._sio.observe(el));\n  }\n\n  /* ---------- tweaks ---------- */\n  applyTweaks() {\n    const root = this.rootEl;\n    if (!root) return;\n    try {\n      const motion = this.props.motion || 'maximal';\n      root.querySelectorAll('[data-anim]').forEach(el => {\n        el.style.animationPlayState = motion === 'calm' ? 'paused' : 'running';\n      });\n      root.querySelectorAll('[data-glow]').forEach(el => {\n        el.style.opacity = motion === 'maximal' ? '1' : (motion === 'balanced' ? '0.55' : '0.25');\n      });\n      const hud = this.props.showHud !== false;\n      root.querySelectorAll('[data-hud]').forEach(el => { el.style.display = hud ? '' : 'none'; });\n    } catch (e) {}\n  }\n\n  /* ---------- render ---------- */\n  renderVals() {\n    const voice = this.props.copyVoice || 'imperial';\n    const active = this.state.active;\n    const stage = this.state.demoStage;\n    const run = this.state.demoRun;\n    const links = [\n      { label: 'Problem', id: 'problem' },\n      { label: 'Solutions', id: 'solutions' },\n      { label: 'Method', id: 'method' },\n      { label: 'Stack', id: 'stack' },\n      { label: 'Impact', id: 'impact' },\n      { label: 'Roadmap', id: 'roadmap' },\n      { label: 'Team', id: 'team' }\n    ];\n    return {\n      rootRef: (el) => { this.rootEl = el; },\n      termBodyRef: (el) => { this.termBodyEl = el; },\n      termInputRef: (el) => { this.termInputEl = el; },\n      demoLogRef: (el) => { this.demoLogEl = el; },\n      nameRef: (el) => { this.nameEl = el; },\n      orgRef: (el) => { this.orgEl = el; },\n      domainRef: (el) => { this.domainEl = el; },\n      briefRef: (el) => { this.briefEl = el; },\n\n      isImperial: voice !== 'engineer',\n      isEngineer: voice === 'engineer',\n\n      navLinks: links.map(l => ({\n        label: l.label, href: '#' + l.id,\n        color: active === l.id ? '#F4C95D' : '#9AA7BC',\n        bar: active === l.id ? '1' : '0'\n      })),\n\n      menuOpen: this.state.menuOpen,\n      menuClosed: !this.state.menuOpen,\n      toggleMenu: () => this.setState(s => ({ menuOpen: !s.menuOpen })),\n      closeMenu: () => this.setState({ menuOpen: false }),\n      mobileLinks: links.map(l => ({\n        label: l.label, href: '#' + l.id,\n        color: active === l.id ? '#F4C95D' : '#E6ECF5',\n        onTap: () => this.setState({ menuOpen: false })\n      })),\n\n      focusTerm: () => { if (this.termInputEl) this.termInputEl.focus(); },\n      onTermKey: (e) => {\n        if (e.key !== 'Enter') return;\n        const v = e.target.value;\n        e.target.value = '';\n        this.exec(v);\n      },\n      termLines: this.state.termLines,\n\n      problems: [\n        { tag: 'climate/energy', status: 'LAGGING', title: 'Models outrun by events', line: 'Decisions due in hours wait on simulations that take weeks.' },\n        { tag: 'bio/health', status: 'BOTTLENECKED', title: 'Compute behind brittle pipes', line: 'Genomic-scale science trapped in infrastructure that breaks under load.' },\n        { tag: 'security/trust', status: 'EXPOSED', title: 'Trust bolted on', line: 'Critical systems built first, secured later — the order is the vulnerability.' },\n        { tag: 'ai/autonomy', status: 'UNPROVEN', title: 'Power without proof', line: 'Models ship faster than anyone can validate what they will do.' }\n      ],\n      solutions: [\n        { idx: '01', name: 'Applied AI & Autonomous Systems', line: 'Decision engines that act with judgment, not just output.', tag: 'ai/autonomy' },\n        { idx: '02', name: 'Climate & Energy Modeling', line: 'Simulation fast enough to steer the grid, not describe it.', tag: 'climate/energy' },\n        { idx: '03', name: 'Health & Genomic Computing', line: 'Pipelines that keep pace with the science.', tag: 'bio/health' },\n        { idx: '04', name: 'Secure Infrastructure & Cryptography', line: 'Trust designed into the foundation, not patched over it.', tag: 'security/crypto' },\n        { idx: '05', name: 'Data Science & Simulation', line: 'Oceans of data, reduced to defensible decisions.', tag: 'data/sim' },\n        { idx: '06', name: 'Civic & Global-Scale Platforms', line: 'Systems that serve populations, not just users.', tag: 'civic/scale' }\n      ],\n\n      scenarios: this.scenarioDefs.map((s, i) => ({\n        label: s.label,\n        onPick: () => this.runDemo(i),\n        color: run === i ? '#F4C95D' : '#9AA7BC',\n        border: run === i ? 'rgba(244,201,93,.55)' : 'rgba(255,255,255,.14)',\n        bg: run === i ? 'rgba(244,201,93,.08)' : 'transparent'\n      })),\n      engineNodes: this.engineDefs.map((e, i) => {\n        const lit = stage >= i;\n        return {\n          name: e.name,\n          bar: lit ? e.accent : 'rgba(255,255,255,.12)',\n          glow: lit ? '0 0 18px ' + e.accent : 'none',\n          col: lit ? '#E6ECF5' : '#5C6678'\n        };\n      }),\n      demoLog: this.state.demoLog,\n      demoDone: stage >= 3,\n      runLabel: run \u003C 0 ? 'RUN' : (stage \u003C 3 ? 'RUNNING…' : 'RE-RUN'),\n      onRun: () => this.runDemo(run \u003C 0 ? 0 : run),\n      engines: [\n        { label: 'ENGINE 01', role: 'Research', desc: 'Deep investigation and synthesis of the problem space before a line is written.', accent: '#F4C95D' },\n        { label: 'ENGINE 02', role: 'Cross-Validation', desc: 'Independent attack on every claim. Nothing advances unproven.', accent: '#57D4FF' },\n        { label: 'ENGINE 03', role: 'Execution', desc: 'Architecture, delivery, and disciplined deployment into the real world.', accent: '#FFD479' }\n      ],\n\n      stackLayers: [\n        { id: 'L04', name: 'INTERFACE', tags: 'TypeScript · WebGPU · Holographic UI' },\n        { id: 'L03', name: 'INTELLIGENCE', tags: 'Orchestrated multi-AI · Research · Validate · Execute' },\n        { id: 'L02', name: 'DATA & SCIENCE', tags: 'Python · CUDA · Simulation · ML' },\n        { id: 'L01', name: 'FOUNDATION', tags: 'Rust · Go · C++ · Formal methods' }\n      ],\n      stats: [\n        { num: 17, suffix: '', label: 'Global challenges in scope', note: 'aligned to UN goals' },\n        { num: 1, suffix: 'B+', label: 'Human scale by design', note: 'architected for billions' },\n        { num: 48, suffix: 'h', label: 'Reply on any brief', note: 'a principal, not a pipeline' }\n      ],\n      phases: [\n        { tag: 'PHASE I', name: 'Foundation', line: 'Core stack, formal-methods base, first proofs of concept.', color: '#F4C95D' },\n        { tag: 'PHASE II', name: 'Domains', line: 'Vertical solutions with design partners in two priority domains.', color: '#E8B94B' },\n        { tag: 'PHASE III', name: 'Platform', line: 'Shared intelligence platform; repeatable deployment.', color: '#79B0F0' },\n        { tag: 'PHASE IV', name: 'Scale', line: 'Planetary deployment — systems serving populations.', color: '#4DA3FF' }\n      ],\n\n      showForm: this.state.formState !== 'sent',\n      showReceipt: this.state.formState === 'sent',\n      refCode: this.state.refCode,\n      formNote: this.state.formNote,\n      formErrorColor: this.state.formNote ? '#F4C95D' : '#5C6678',\n      onSubmit: (e) => {\n        e.preventDefault();\n        const name = this.nameEl ? this.nameEl.value.trim() : '';\n        const brief = this.briefEl ? this.briefEl.value.trim() : '';\n        if (!name || !brief) {\n          this.setState({ formNote: '// name and problem brief are required' });\n          return;\n        }\n        const code = 'AUR-2026-' + Math.floor(1000 + Math.random() * 9000);\n        const org = this.orgEl ? this.orgEl.value.trim() : '';\n        const domain = this.domainEl ? this.domainEl.value : '';\n        const subject = encodeURIComponent('Engagement brief — ' + (org || name) + ' [' + code + ']');\n        const body = encodeURIComponent('Name: ' + name + '\\nOrganization: ' + (org || '—') + '\\nDomain: ' + (domain || '—') + '\\n\\nProblem:\\n' + brief + '\\n\\nref: ' + code);\n        this.setState({ formState: 'sent', refCode: code, formNote: '' });\n        window.location.href = 'mailto:build@aureliusdynamic.com?subject=' + subject + '&body=' + body;\n      },\n      resetForm: () => this.setState({ formState: 'idle', formNote: '' })\n    };\n  }\n}\n\u003C/script>\n\n\n\u003C/body>\u003C/html>"
  </script>
