<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<svg viewBox="0 0 120 120" width="100%" height="100%" style="display:block;overflow:visible">
  <defs>
    <linearGradient id="amk-a-{{ variant }}" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="{{ goldA }}"></stop>
      <stop offset="0.5" stop-color="{{ goldB }}"></stop>
      <stop offset="1" stop-color="{{ goldC }}"></stop>
    </linearGradient>
    <linearGradient id="amk-h-{{ variant }}" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="{{ blueA }}"></stop>
      <stop offset="1" stop-color="{{ blueB }}"></stop>
    </linearGradient>
  </defs>
  <circle cx="60" cy="60" r="55" fill="none" stroke="url(#amk-h-{{ variant }})" stroke-width="1" stroke-dasharray="2 8" stroke-linecap="round" style="opacity:.5"></circle>
  <polygon points="60,12 101.6,36 101.6,84 60,108 18.4,84 18.4,36" fill="none" stroke="url(#amk-h-{{ variant }})" stroke-width="2" stroke-linejoin="round" style="opacity:.92"></polygon>
  <polygon points="60,26 89.4,43 89.4,77 60,94 30.6,77 30.6,43" fill="none" stroke="url(#amk-h-{{ variant }})" stroke-width="1" stroke-linejoin="round" style="opacity:.2"></polygon>
  <path d="M60 30 L41 87 M60 30 L79 87 M49 67 L71 67" fill="none" stroke="url(#amk-a-{{ variant }})" stroke-width="5.5" stroke-linecap="round" stroke-linejoin="round"></path>
  <circle cx="60" cy="30" r="6" fill="{{ apex }}"></circle>
  <circle cx="41" cy="87" r="3.2" fill="{{ node }}"></circle>
  <circle cx="79" cy="87" r="3.2" fill="{{ node }}"></circle>
  <circle cx="101.6" cy="36" r="2.6" fill="{{ node }}" style="opacity:.85"></circle>
  <circle cx="18.4" cy="84" r="2.6" fill="{{ node }}" style="opacity:.85"></circle>
</svg>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;: {&quot;width&quot;: 120, &quot;height&quot;: 120}, &quot;variant&quot;: {&quot;editor&quot;: &quot;enum&quot;, &quot;options&quot;: [&quot;default&quot;, &quot;mono&quot;, &quot;ink&quot;], &quot;default&quot;: &quot;default&quot;, &quot;tsType&quot;: &quot;string&quot;}}">
class Component extends DCLogic {
  renderVals() {
    const v = this.props.variant ?? 'default';
    const P = {
      default: { goldA: '#FFE7A6', goldB: '#F4C95D', goldC: '#C9962F', blueA: '#7CE0FF', blueB: '#2B6CF6', apex: '#FFD479', node: '#57D4FF' },
      mono:    { goldA: '#E6ECF5', goldB: '#E6ECF5', goldC: '#E6ECF5', blueA: '#E6ECF5', blueB: '#8A97AB', apex: '#E6ECF5', node: '#C9D4E3' },
      ink:     { goldA: '#06080C', goldB: '#06080C', goldC: '#06080C', blueA: '#06080C', blueB: '#06080C', apex: '#06080C', node: '#06080C' }
    };
    return Object.assign({ variant: v }, P[v] || P.default);
  }
}
</script>
</body>
</html>
